<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="eye" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="4"/>
      <feGaussianBlur stdDeviation="6"/>
      <feComposite operator="out" in="SourceGraphic"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Subtle grid pattern overlay -->
  <g opacity="0.06">
    <line x1="128" y1="16" x2="128" y2="496" stroke="white" stroke-width="1"/>
    <line x1="256" y1="16" x2="256" y2="496" stroke="white" stroke-width="1"/>
    <line x1="384" y1="16" x2="384" y2="496" stroke="white" stroke-width="1"/>
    <line x1="16" y1="128" x2="496" y2="128" stroke="white" stroke-width="1"/>
    <line x1="16" y1="256" x2="496" y2="256" stroke="white" stroke-width="1"/>
    <line x1="16" y1="384" x2="496" y2="384" stroke="white" stroke-width="1"/>
  </g>

  <!-- Shield shape -->
  <path d="M256 72 L400 136 L400 280 C400 370 340 430 256 456 C172 430 112 370 112 280 L112 136 Z"
        fill="url(#shield)" filter="url(#innerShadow)" opacity="0.95"/>

  <!-- Shield highlight edge -->
  <path d="M256 72 L400 136 L400 280 C400 370 340 430 256 456 C172 430 112 370 112 280 L112 136 Z"
        fill="none" stroke="#c4b5fd" stroke-width="2" opacity="0.4"/>

  <!-- Eye outer shape -->
  <ellipse cx="256" cy="260" rx="100" ry="56" fill="url(#eye)" opacity="0.9" filter="url(#glow)"/>

  <!-- Eye iris -->
  <circle cx="256" cy="260" r="38" fill="#4f46e5"/>

  <!-- Eye pupil -->
  <circle cx="256" cy="260" r="20" fill="#0f0f23"/>

  <!-- Eye highlight -->
  <circle cx="266" cy="250" r="8" fill="white" opacity="0.8"/>
  <circle cx="248" cy="268" r="3" fill="white" opacity="0.4"/>

  <!-- Scan line across eye -->
  <line x1="156" y1="260" x2="356" y2="260" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3"/>

  <!-- Log lines at bottom of shield -->
  <g opacity="0.5" stroke-linecap="round">
    <line x1="170" y1="340" x2="342" y2="340" stroke="#4ade80" stroke-width="3"/>
    <line x1="185" y1="358" x2="310" y2="358" stroke="#eab308" stroke-width="3"/>
    <line x1="200" y1="376" x2="280" y2="376" stroke="#ef4444" stroke-width="3"/>
    <line x1="210" y1="394" x2="330" y2="394" stroke="#64748b" stroke-width="2"/>
  </g>
</svg>
